<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — IronForge</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-wrap{max-width:1100px;margin:0 auto;padding:120px 36px 60px}
.admin-login{max-width:380px;margin:120px auto;text-align:center}
.admin-login h2{font-size:1.4rem;font-weight:700;margin-bottom:24px}
.admin-login .aw-field{margin-bottom:20px}
.admin-login .aw-btn{margin-top:4px}
.admin-layout{display:grid;grid-template-columns:200px 1fr;gap:32px;min-height:60vh}
.admin-nav{display:flex;flex-direction:column;gap:2px}
.admin-nav button{text-align:left;padding:10px 16px;font-size:.85rem;font-family:inherit;font-weight:500;border:none;border-radius:8px;background:transparent;color:var(--text-soft);cursor:pointer;transition:all .2s}
.admin-nav button:hover{background:rgba(29,29,31,.03);color:var(--text)}
.admin-nav button.active{background:rgba(29,29,31,.06);color:var(--text);font-weight:600}
.admin-main{min-height:400px}
.admin-main h3{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.admin-main p{color:var(--text-soft);font-size:.85rem;margin-bottom:8px}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.admin-stat{border:1px solid var(--border);border-radius:12px;padding:20px;background:var(--surface);text-align:center}
.admin-stat-num{font-size:1.6rem;font-weight:700;letter-spacing:-.5px}
.admin-stat-lbl{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.admin-table{width:100%;border-collapse:collapse;font-size:.82rem}
.admin-table th{text-align:left;padding:10px 12px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.admin-table tr:hover td{background:rgba(29,29,31,.02)}
.admin-table .del{color:#c62828;background:none;border:none;cursor:pointer;font-size:.78rem;padding:2px 8px;border-radius:4px}
.admin-table .del:hover{background:rgba(198,40,40,.08)}
.admin-table .edit{color:var(--text);background:none;border:none;cursor:pointer;font-size:.78rem;padding:2px 8px;border-radius:4px}
.admin-table .edit:hover{background:rgba(29,29,31,.06)}
.admin-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.admin-actions button{padding:8px 18px;font-size:.8rem;font-weight:600;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;transition:all .2s;color:var(--text)}
.admin-actions button:hover{border-color:rgba(29,29,31,.2);background:rgba(29,29,31,.03)}
.admin-actions button.pri{background:linear-gradient(135deg,#2d2d2f,#1d1d1f);color:#fff;border:none}
.admin-actions button.pri:hover{opacity:.92}
.admin-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px}
.admin-form.full{grid-template-columns:1fr}
.admin-form label{font-size:.75rem;font-weight:600;color:var(--text-soft);margin-bottom:2px;display:block}
.admin-form input,.admin-form select,.admin-form textarea{width:100%;padding:8px 12px;font-size:.85rem;font-family:inherit;border:1px solid var(--border);border-radius:8px;color:var(--text);background:var(--surface);transition:border-color .2s}
.admin-form input:focus,.admin-form select:focus,.admin-form textarea:focus{outline:none;border-color:var(--text)}
.admin-form textarea{min-height:60px;resize:vertical}
.admin-form .btn{padding:8px 20px;font-size:.82rem;margin-top:4px}
.admin-tip{font-size:.75rem;color:var(--text-muted);background:rgba(29,29,31,.03);padding:14px 18px;border-radius:10px;margin-bottom:20px;line-height:1.6}
.admin-tip a{font-weight:600;color:var(--text);text-decoration:underline}
.admin-tip strong{color:var(--text)}
.admin-err{color:#c62828;font-size:.82rem;margin-bottom:10px}
@media(max-width:700px){.admin-layout{grid-template-columns:1fr}.admin-nav{flex-direction:row;flex-wrap:wrap;gap:4px}.admin-nav button{font-size:.78rem;padding:8px 14px}}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">ironforge</a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="/">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="classes.html">Classes</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="nav-cta">Join</a></li>
  </ul>
</nav>

<div id="adminApp">
  <div class="admin-login" id="adminLogin">
    <h2>Admin</h2>
    <div class="aw-field">
      <input type="password" class="aw-input" id="adminPass" placeholder="Password">
      <label class="aw-label">Password</label>
      <span class="aw-line"></span>
    </div>
    <button class="aw-btn" id="adminLoginBtn"><span class="aw-btn-text">Sign in</span></button>
    <div id="adminLoginErr" class="aw-error" style="margin-top:12px"></div>
  </div>

  <div class="admin-wrap" id="adminPanel" style="display:none">
    <div class="admin-layout">
      <div class="admin-nav">
        <button class="active" data-tab="dashboard">Dashboard</button>
        <button data-tab="classes">Classes</button>
        <button data-tab="users">Members</button>
        <button data-tab="bookings">Bookings</button>
        <button data-tab="messages">Messages</button>
        <button data-tab="content">Site Content</button>
        <button data-tab="help" style="margin-top:20px;color:var(--text-muted);font-size:.78rem">Setup Guide</button>
      </div>
      <div class="admin-main" id="adminMain">
        <p>Select a section from the left.</p>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
var token=localStorage.getItem('admin_token');
var currentTab='dashboard';

function showLogin(err){
  document.getElementById('adminLogin').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  if(err)document.getElementById('adminLoginErr').textContent=err;
}
function showPanel(){
  document.getElementById('adminLogin').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  loadTab(currentTab);
}

if(token){ showPanel(); } else { showLogin(); }

document.getElementById('adminLoginBtn').onclick=function(){
  var pass=document.getElementById('adminPass').value;
  if(!pass){document.getElementById('adminLoginErr').textContent='Enter password';return}
  document.getElementById('adminLoginBtn').disabled=true;
  document.getElementById('adminLoginBtn').innerHTML='<span class="aw-btn-text">Signing in...</span>';
  fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.error){document.getElementById('adminLoginErr').textContent=d.error;document.getElementById('adminLoginBtn').disabled=false;document.getElementById('adminLoginBtn').innerHTML='<span class="aw-btn-text">Sign in</span>';return}
    token=d.token;localStorage.setItem('admin_token',token);showPanel();
  }).catch(function(){document.getElementById('adminLoginErr').textContent='Network error';document.getElementById('adminLoginBtn').disabled=false;document.getElementById('adminLoginBtn').innerHTML='<span class="aw-btn-text">Sign in</span>'})
};

document.querySelectorAll('.admin-nav button').forEach(function(btn){
  btn.onclick=function(){
    document.querySelectorAll('.admin-nav button').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');currentTab=btn.getAttribute('data-tab');loadTab(currentTab);
  };
});

function api(url,opts){
  if(!opts)opts={};
  if(!opts.headers)opts.headers={};
  opts.headers['Authorization']='Bearer '+token;
  return fetch(url,opts).then(function(r){return r.json()}).then(function(d){
    if(d.error==='Invalid token'||d.error==='Not authorized'||d.error==='No token provided'){
      localStorage.removeItem('admin_token');showLogin('Session expired. Sign in again.');return Promise.reject(d.error)
    }
    return d;
  });
}

function loadTab(tab){
  var el=document.getElementById('adminMain');
  if(tab==='dashboard')loadDashboard(el);
  else if(tab==='classes')loadClasses(el);
  else if(tab==='users')loadUsers(el);
  else if(tab==='bookings')loadBookings(el);
  else if(tab==='messages')loadMessages(el);
  else if(tab==='content')loadContent(el);
  else if(tab==='help')loadHelp(el);
}

function loadDashboard(el){
  el.innerHTML='<div class="load">Loading</div>';
  Promise.all([api('/api/admin/users'),api('/api/admin/bookings'),api('/api/admin/contacts'),api('/api/classes')]).then(function(results){
    var users=results[0],bookings=results[1],contacts=results[2],classes=results[3];
    el.innerHTML='<h3>Dashboard</h3><div class="admin-stats">'+
      '<div class="admin-stat"><div class="admin-stat-num">'+classes.length+'</div><div class="admin-stat-lbl">Classes</div></div>'+
      '<div class="admin-stat"><div class="admin-stat-num">'+users.length+'</div><div class="admin-stat-lbl">Members</div></div>'+
      '<div class="admin-stat"><div class="admin-stat-num">'+bookings.length+'</div><div class="admin-stat-lbl">Bookings</div></div>'+
      '<div class="admin-stat"><div class="admin-stat-num">'+contacts.length+'</div><div class="admin-stat-lbl">Messages</div></div>'+
    '</div><p style="color:var(--text-soft);font-size:.82rem">Edit data directly in your <a href="https://docs.google.com/spreadsheets/d/'+new URLSearchParams(window.location.search).get('sheet')+'" target="_blank" style="font-weight:600;text-decoration:underline">Google Sheet</a>, or use the tabs on the left.</p>';
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

function loadClasses(el){
  el.innerHTML='<div class="load">Loading</div>';
  api('/api/classes').then(function(classes){
    var h='<h3>Classes ('+classes.length+')</h3>';
    h+='<div class="admin-tip">To add or edit classes, open your <a href="#" id="sheetLink" target="_blank" style="font-weight:600">Google Sheet</a> and edit the <strong>Classes</strong> tab directly. Changes appear on the site within ~30 seconds.</div>';
    h+='<div class="admin-actions"><button class="pri" onclick="showAddClass()">+ Add Class</button></div>';
    h+='<table class="admin-table"><thead><tr><th>Name</th><th>Time</th><th>Day</th><th>Instructor</th><th>Capacity</th><th></th></tr></thead><tbody>';
    classes.forEach(function(c){
      h+='<tr><td>'+c.name+'</td><td>'+c.time+'</td><td>'+c.day+'</td><td>'+(c.instructor||'—')+'</td><td>'+c.capacity+'</td><td><button class="del" onclick="deleteClass('+c.id+')">Deactivate</button></td></tr>';
    });
    h+='</tbody></table>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

window.showAddClass=function(){
  var el=document.getElementById('adminMain');
  el.innerHTML='<h3>Add Class</h3><div class="admin-form" style="margin-top:16px">'+
    '<div><label>Name</label><input id="acName"></div><div><label>Time</label><input id="acTime" placeholder="06:00"></div>'+
    '<div><label>Day</label><select id="acDay"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div>'+
    '<div><label>Instructor</label><input id="acInstructor"></div>'+
    '<div><label>Duration (min)</label><input id="acDuration" type="number" value="60"></div>'+
    '<div><label>Capacity</label><input id="acCapacity" type="number" value="20"></div>'+
    '<div class="full"><label>Description</label><textarea id="acDesc"></textarea></div>'+
    '<div class="full"><button class="btn btn-s btn-sm" onclick="saveClass()">Save Class</button> <button class="btn btn-o btn-sm" onclick="loadClasses(document.getElementById(\'adminMain\'))">Cancel</button></div>'+
  '</div>';
};

window.saveClass=function(){
  var data={name:document.getElementById('acName').value,time:document.getElementById('acTime').value,day:document.getElementById('acDay').value,instructor:document.getElementById('acInstructor').value,duration:parseInt(document.getElementById('acDuration').value)||60,capacity:parseInt(document.getElementById('acCapacity').value)||20,description:document.getElementById('acDesc').value};
  if(!data.name||!data.time){alert('Name and time required');return}
  api('/api/admin/classes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(d){
    if(d.error)alert(d.error);else loadClasses(document.getElementById('adminMain'));
  });
};

window.deleteClass=function(id){
  if(!confirm('Deactivate this class?'))return;
  api('/api/admin/classes/'+id,{method:'DELETE'}).then(function(d){if(!d.error)loadClasses(document.getElementById('adminMain'))});
};

function loadUsers(el){
  el.innerHTML='<div class="load">Loading</div>';
  api('/api/admin/users').then(function(users){
    var h='<h3>Members ('+users.length+')</h3><table class="admin-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead><tbody>';
    users.forEach(function(u){
      h+='<tr><td>'+u.id+'</td><td>'+u.name+'</td><td>'+u.email+'</td><td>'+(u.phone||'—')+'</td><td>'+(u.created_at?u.created_at.slice(0,10):'—')+'</td></tr>';
    });
    h+='</tbody></table>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

function loadBookings(el){
  el.innerHTML='<div class="load">Loading</div>';
  api('/api/admin/bookings').then(function(bookings){
    var h='<h3>Bookings ('+bookings.length+')</h3><div class="tw"><table class="admin-table"><thead><tr><th>Class</th><th>Date</th><th>Time</th><th>Member</th><th>Email</th><th>Booked</th></tr></thead><tbody>';
    bookings.forEach(function(b){
      h+='<tr><td>'+b.class_name+'</td><td>'+b.booking_date+'</td><td>'+b.time+'</td><td>'+b.user_name+'</td><td>'+b.user_email+'</td><td>'+(b.created_at?b.created_at.slice(0,10):'—')+'</td></tr>';
    });
    h+='</tbody></table></div>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

function loadMessages(el){
  el.innerHTML='<div class="load">Loading</div>';
  api('/api/admin/contacts').then(function(msgs){
    var h='<h3>Messages ('+msgs.length+')</h3><table class="admin-table"><thead><tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th></tr></thead><tbody>';
    msgs.forEach(function(m){
      h+='<tr><td>'+m.name+'</td><td>'+m.email+'</td><td style="max-width:300px;white-space:normal">'+m.message+'</td><td>'+(m.created_at?m.created_at.slice(0,10):'—')+'</td></tr>';
    });
    h+='</tbody></table>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

function loadContent(el){
  el.innerHTML='<div class="load">Loading</div>';
  api('/api/admin/content').then(function(content){
    var h='<h3>Site Content</h3>';
    h+='<div class="admin-tip">Edit site text directly in your Google Sheet\'s <strong>Content</strong> tab. Each row is a <code>key</code> (e.g. <code>hero_title</code>) and <code>value</code> (the text shown on the site).</div>';
    h+='<table class="admin-table"><thead><tr><th>Key</th><th>Value</th><th></th></tr></thead><tbody>';
    for(var k in content){
      h+='<tr><td style="font-weight:500">'+k+'</td><td style="max-width:300px;white-space:normal;font-size:.78rem">'+content[k]+'</td><td><button class="edit" onclick="editContent(\''+k+'\',\''+content[k].replace(/'/g,"\\'")+'\')">Edit</button></td></tr>';
    }
    h+='</tbody></table>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div class="load">Could not load</div>'});
}

window.editContent=function(key,val){
  var v=prompt('Value for "'+key+'":',val);
  if(v===null||v===val)return;
  api('/api/admin/content',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,value:v})}).then(function(d){
    if(!d.error)loadContent(document.getElementById('adminMain'));
  });
};

function loadHelp(el){
  el.innerHTML='<h3>Setup Guide</h3>'+
  '<div style="line-height:1.8;font-size:.88rem;color:var(--text-soft);max-width:600px">'+
    '<p style="margin-bottom:16px">This site uses <strong>Google Sheets</strong> as its database. Here\'s how it works:</p>'+
    '<ol style="padding-left:18px;margin-bottom:16px">'+
      '<li style="margin-bottom:8px">Create a Google Sheet with tabs: <strong>Classes, Content, Users, Bookings, Contacts</strong></li>'+
      '<li style="margin-bottom:8px">Share the sheet with your service account email</li>'+
      '<li style="margin-bottom:8px">Set the <code>GOOGLE_SHEET_ID</code> and credentials in environment variables</li>'+
      '<li style="margin-bottom:8px">Edit the <strong>Classes</strong> and <strong>Content</strong> tabs to update your site</li>'+
    '</ol>'+
    '<p style="margin-bottom:8px"><strong>Quick tip:</strong> You can edit classes and content directly in the Google Sheet like a normal spreadsheet. No coding needed.</p>'+
    '<p style="margin-bottom:8px">Add <code>active: FALSE</code> to hide a class without deleting it.</p>'+
  '</div>';
}
})();
</script>
<script src="js/main.js"></script>
</body>
</html>
